spring:
  application:
    name: estaciona-api

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/estaciona_db
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: 60

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health

---
# Perfil de desarrollo
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    open-in-view: false

---
# Perfil de test: Testcontainers sobreescribe el datasource vía @DynamicPropertySource
spring:
  config:
    activate:
      on-profile: test
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
